<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Black Russia Store</title>
    
    <!-- 1. ПОДКЛЮЧАЕМ ПРАВИЛЬНЫЙ СКРИПТ ТЕЛЕГРАМ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 2. ИСПРАВЛЕННЫЕ ПУТИ К СТИЛЯМ (БЕЗ СЛЭША В НАЧАЛЕ) -->
    <link rel="stylesheet" href="_next/static/chunks/b756ec20543b9ab7.css">
    
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .loading-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0a; z-index: 100; }
        .card-custom { background: rgba(25, 25, 25, 0.8); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>

    <script>
        window.onload = function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            // Скрываем экран загрузки через 1.5 секунды
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if(loader) loader.style.display = 'none';
            }, 1500);

            // Обработка кликов по кнопкам (связь с твоим VDS)
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('button');
                if (btn) {
                    const itemName = btn.getAttribute('data-item') || btn.innerText;
                    tg.sendData(itemName); 
                    tg.close();
                }
            });
        };
    </script>
</head>
<body class="antialiased">

    <div id="loader" class="loading-screen">
        <p>Загрузка магазина...</p>
    </div>

    <div style="padding: 20px; text-align: center;">
        <header style="width: 100%; padding: 20px; display: flex; justify-content: flex-end; background: linear-gradient(to bottom, #0d49a1, transparent);">
            <div style="background: white; color: black; padding: 8px 16px; border-radius: 15px; font-weight: bold; font-size: 14px;">Магазин Активен</div>
        </header>

        <h1 style="color: #3f89f8; margin-top: 40px; font-size: 24px;">BLACK RUSSIA STORE</h1>
        <p style="opacity: 0.6; margin-bottom: 40px;">Лучший курс игровой валюты</p>

        <!-- Твои товары -->
        <div class="card-custom">
            <div style="text-align: left;">
                <div style="font-weight: bold; font-size: 18px;">500,000 Вирт</div>
                <div style="color: #3f89f8; font-weight: bold;">150 ₽</div>
            </div>
            <button data-item="500k_virts" style="background: linear-gradient(to right, #3f89f8, #0f57c1); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer;">КУПИТЬ</button>
        </div>

        <div class="card-custom">
            <div style="text-align: left;">
                <div style="font-weight: bold; font-size: 18px;">1,000,000 Вирт</div>
                <div style="color: #3f89f8; font-weight: bold;">280 ₽</div>
            </div>
            <button data-item="1kk_virts" style="background: linear-gradient(to right, #3f89f8, #0f57c1); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer;">КУПИТЬ</button>
        </div>
    </div>

    <script src="_next/static/chunks/1987c84130c2f8d0.js" async></script>
    <script src="_next/static/chunks/9c3fa0da01deaa57.js" async></script>
</body>
</html>
