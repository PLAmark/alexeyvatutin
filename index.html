<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 1. ПОДКЛЮЧАЕМ ТЕЛЕГРАМ -->
    <script src="https://telegram.org"></script>
    
    <link rel="stylesheet" href="_next/static/chunks/b756ec20543b9ab7.css">
    <title>Black Russia Store</title>
</head>
<body class="antialiased">
    <!-- СЮДА ВСТАВЛЯЕМ ВЕСЬ ТВОЙ ОРИГИНАЛЬНЫЙ КОД ИЗ ФАЙЛА INDEX.HTML -->
    <!-- (Тот длинный код со всеми div и скриптами Next.js) -->

    <script>
        // 2. ОЖИВЛЯЕМ КНОПКИ БЕЗ ИЗМЕНЕНИЯ ДИЗАЙНА
        window.onload = function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            // Слушаем клики по всему экрану
            document.addEventListener('click', function(e) {
                // Если кликнули по кнопке или внутри неё
                const btn = e.target.closest('button');
                if (btn) {
                    const btnText = btn.innerText || "Заказ";
                    tg.sendData(btnText); // Отправляем текст кнопки (например "BLACK RUSSIA") боту на VDS
                    tg.close();
                }
            });
        };
    </script>
</body>
</html>
