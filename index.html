    <script>
        // Скрипт для связи кнопок с твоим ботом на VDS
        window.onload = function() {
            const tg = window.Telegram.WebApp;
            tg.expand(); // Разворачиваем окно
            tg.ready();

            // Функция, которая при клике на ЛЮБУЮ кнопку отправит текст этой кнопки боту
            document.addEventListener('click', function(e) {
                if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                    const btn = e.target.tagName === 'BUTTON' ? e.target : e.target.closest('button');
                    const itemText = btn.innerText || "Заказ товара";
                    tg.sendData(itemText); // Отправка боту
                    tg.close(); // Закрываем окно
                }
            });
        };
    </script>
