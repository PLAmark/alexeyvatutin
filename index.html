<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Mini App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container card">

  <h1 class="title">ГЛАВНАЯ</h1>
  <p class="subtitle">История последних покупок<br>Загрузка...</p>

  <div class="section">
    <h2 class="title">ВЫБОР ИГРЫ:</h2>

    <div class="game-btn gta" onclick="selectGame('gta')">
      <span>GTA 5 RP</span>
    </div>

    <div class="game-btn br" onclick="selectGame('br')">
      <span>BLACK RUSSIA</span>
    </div>

    <div class="alert">
      ⚠️ Выберите нужный сервер, чтобы начать операцию
    </div>
  </div>

  <div class="section">
    <h2 class="title">РЕФЕРАЛЬНАЯ СИСТЕМА</h2>
    <p class="subtitle">
      Приглашайте друзей и получайте бонусы от их покупок!
    </p>

    <button class="copy-btn" onclick="copyLink()">СКОПИРОВАТЬ ССЫЛКУ</button>
  </div>

</div>

<div class="bottom-nav">
  <div class="nav-item">👤</div>
  <div class="nav-item active">🏠</div>
  <div class="nav-item">🔗</div>
  <div class="nav-item">💬</div>
</div>

<script>
function selectGame(game) {
  if (game === 'gta') {
    alert('Вы выбрали GTA 5 RP');
    // тут потом сделаем переход
  }

  if (game === 'br') {
    alert('Вы выбрали Black Russia');
  }
}

function copyLink() {
  const link = "https://t.me/your_bot?start=ref123"; // замени на свою
  navigator.clipboard.writeText(link);
  alert("Ссылка скопирована!");
}
</script>

</body>
</html>
