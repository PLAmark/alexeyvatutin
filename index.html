<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Black Russia Store</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent-blue: #3f89f8;
            --accent-red: #e61e22;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at 50% 0%, #1a56ab 0%, #0a0a0a 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; height: 100vh;
        }
        .page {
            display: none; padding: 20px; padding-bottom: 110px;
            height: 100vh; overflow-y: auto; box-sizing: border-box;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .page.active { display: block; }
        
        .header-logo { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .header-logo h1 { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-blue); margin: 0; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-info h3 { margin: 0; font-size: 18px; font-weight: 700; }
        .card-info p { margin: 4px 0 0 0; color: var(--accent-blue); font-weight: 800; font-size: 18px; }

        .buy-btn {
            background: linear-gradient(135deg, #e61e22 0%, #b21316 100%);
            color: white; border: none; padding: 12px 24px;
            border-radius: 14px; font-weight: 700; font-size: 14px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(230, 30, 34, 0.3);
        }
        .buy-btn:active { transform: scale(0.94); }

        /* Навигация */
        .nav {
            position: fixed; bottom: 20px; left: 5%; width: 90%; height: 74px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); border-radius: 22px;
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            opacity: 0.4; font-size: 11px; font-weight: 500; transition: 0.2s;
        }
        .nav-item.active { opacity: 1; color: var(--accent-blue); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <!-- СТРАНИЦА: ГЛАВНАЯ -->
    <div id="home" class="page active">
        <div class="header-logo"><h1>BLACK RUSSIA</h1></div>
        <div class="card">
            <div class="card-info"><h3>500,000 ВИРТ</h3><p>150 ₽</p></div>
            <button class="buy-btn" onclick="sendOrder('500k_virts')">КУПИТЬ</button>
        </div>
        <div class="card">
            <div class="card-info"><h3>1,000,000 ВИРТ</h3><p>280 ₽</p></div>
            <button class="buy-btn" onclick="sendOrder('1kk_virts')">КУПИТЬ</button>
        </div>
        <div class="card">
            <div class="card-info"><h3>3,000,000 ВИРТ</h3><p>750 ₽</p></div>
            <button class="buy-btn" onclick="sendOrder('3kk_virts')">КУПИТЬ</button>
        </div>
    </div>

    <!-- СТРАНИЦА: ПРОФИЛЬ -->
    <div id="profile" class="page">
        <div class="header-logo"><h1>ПРОФИЛЬ</h1></div>
        <div class="card" style="flex-direction: column; align-items: flex-start;">
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 10px;">Информация об игроке:</p>
            <div style="font-size: 18px; font-weight: 700; margin-bottom: 5px;">Имя: <span id="user_name" style="color: var(--accent-blue);">Загрузка...</span></div>
            <div style="font-size: 14px; opacity: 0.7;">Telegram ID: <span id="user_id">...</span></div>
        </div>
    </div>

    <!-- СТРАНИЦА: ПОМОЩЬ -->
    <div id="help" class="page">
        <div class="header-logo"><h1>ПОДДЕРЖКА</h1></div>
        <div class="card" style="flex-direction: column; text-align: center;">
            <p style="margin-bottom: 20px;">Есть вопросы по оплате? Напишите нашему менеджеру!</p>
            <button class="buy-btn" style="background: var(--accent-blue); box-shadow: 0 4px 15px rgba(63, 137, 248, 0.3);" onclick="window.open('https://t.me')">НАПИСАТЬ АДМИНУ</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="nav">
        <div class="nav-item" onclick="showPage('profile', this)"><span class="nav-icon">👤</span>Профиль</div>
        <div class="nav-item active" onclick="showPage('home', this)"><span class="nav-icon">🏠</span>Главная</div>
        <div class="nav-item" onclick="showPage('help', this)"><span class="nav-icon">💬</span>Помощь</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Подгружаем данные из ТГ
        if (tg.initDataUnsafe.user) {
            document.getElementById('user_name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user_id').innerText = tg.initDataUnsafe.user.id;
        }

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light'); // Виброотклик при нажатии
        }

        function sendOrder(item) {
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(item);
            tg.close();
        }
    </script>
</body>
</html>
