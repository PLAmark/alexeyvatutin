<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('bg.png') no-repeat center/cover;
  color: white;
}

.container {
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
}

/* СКРЫТИЕ ЭКРАНОВ */
.screen {
  display: none;
}

.active {
  display: block;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

.game-btn, .server-btn {
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.gta {
  background: linear-gradient(90deg, orange, red);
}

.br {
  background: linear-gradient(90deg, #ff4b6e, red);
}

.server-btn {
  background: rgba(255,255,255,0.1);
}

.back-btn {
  margin-bottom: 10px;
  cursor: pointer;
  color: #aaa;
}

img {
  height: 20px;
  margin-right: 5px;
}
</style>

</head>
<body>

<div class="container">

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="home" class="screen active card">

<h2>ГЛАВНАЯ</h2>

<p>История последних покупок<br>Загрузка...</p>

<h3>ВЫБОР ИГРЫ:</h3>

<div class="game-btn gta" onclick="openServers('gta')">
  <img src="gta5rp.svg"> GTA 5 RP
</div>

<div class="game-btn br" onclick="openServers('br')">
  <img src="black-russia.svg"> BLACK RUSSIA
</div>

</div>

<!-- ЭКРАН СЕРВЕРОВ -->
<div id="servers" class="screen card">

<div class="back-btn" onclick="goBack()">⬅ Назад</div>

<h3>ВЫБОР СЕРВЕРА</h3>

<div id="server-list"></div>

</div>

</div>

<script>
let currentGame = '';

// ОТКРЫТЬ СЕРВЕРА
function openServers(game) {
  currentGame = game;

  document.getElementById('home').classList.remove('active');
  document.getElementById('servers').classList.add('active');

  loadServers();
}

// ЗАГРУЗКА СЕРВЕРОВ
function loadServers() {
  const container = document.getElementById('server-list');
  container.innerHTML = '';

  let servers = [];

  if (currentGame === 'gta') {
    servers = ['Downtown', 'Strawberry', 'Vinewood'];
  }

  if (currentGame === 'br') {
    servers = ['Москва', 'Питер', 'Казань'];
  }

  servers.forEach(server => {
    const div = document.createElement('div');
    div.className = 'server-btn';
    div.innerText = server;

    div.onclick = () => {
      alert(`Вы выбрали сервер: ${server}`);
      // тут дальше сделаем покупку
    };

    container.appendChild(div);
  });
}

// НАЗАД
function goBack() {
  document.getElementById('servers').classList.remove('active');
  document.getElementById('home').classList.add('active');
}
</script>

</body>
</html>
