<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('bg.png') no-repeat center/cover;
  color: white;
}

.container {
  max-width: 400px;
  margin: 30px auto;
  padding: 15px;
}

.screen { display: none; }
.active { display: block; }

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

.btn {
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.gta { background: linear-gradient(90deg, orange, red); }
.br { background: linear-gradient(90deg, #ff4b6e, red); }

.server-btn {
  background: rgba(255,255,255,0.1);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

#serversContainer {
  max-height: 300px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">

<!-- ГЛАВНАЯ -->
<div id="home" class="screen active card">
<h2>ВЫБОР ИГРЫ</h2>

<div class="btn gta" onclick="openServers('gta')">
  <img src="gta5rp.svg" height="20"> GTA 5 RP
</div>

<div class="btn br" onclick="openServers('br')">
  <img src="black-russia.svg" height="20"> BLACK RUSSIA
</div>
</div>

<!-- СЕРВЕРА -->
<div id="servers" class="screen card">
<div onclick="goHome()">⬅ Назад</div>
<h3>ВЫБОР СЕРВЕРА</h3>

<div id="serversList"></div>
</div>

<!-- ПОКУПКА -->
<div id="buy" class="screen card">
<div onclick="goServers()">⬅ Назад</div>

<input id="nickname" placeholder="Введите ник">
<div id="amounts"></div>

<div class="btn" onclick="buy()">КУПИТЬ</div>
</div>

</div>

<script>
// ===== СОСТОЯНИЕ =====
let game = '';
let server = '';
let amount = 0;

// ===== ДАННЫЕ =====
const brColors = ["RED","GREEN","BLUE","YELLOW","ORANGE","PURPLE","LIME","PINK","CHERRY","BLACK","INDIGO","WHITE","MAGENTA","CRIMSON","GOLD","AZURE","PLATINUM","AQUA","GRAY","ICE"];

const brCities = ["CHILLI","CHOCO","MOSCOW","SPB","UFA","SOCHI","KAZAN","SAMARA","ROSTOV","ANAPA","EKB","KRASNODAR","ARZAMAS","NOVOSIB","GROZNY","SARATOV","OMSK","IRKUTSK","VOLGOGRAD","VORONEZH","BELGOROD","MAKHACHKALA","VLADIKAVKAZ","VLADIVOSTOK","KALININGRAD","CHELYABINSK","KRASNOYARSK","CHEBOKSARY","KHABAROVSK","PERM","TULA","RYAZAN","MURMANSK","PENZA","KURSK","ARKHANGELSK","ORENBURG","KIROV","KEMEROVO","TYUMEN","TOLYATTI","IVANOVO","STAVROPOL","SMOLENSK","PSKOV","BRYANSK","OREL","YAROSLAVL","BARNAUL","LIPETSK","ULYANOVSK","YAKUTSK","TAMBOV","BRATSK","ASTRAKHAN","CHITA","KOSTROMA","VLADIMIR","KALUGA","NOVGOROD","TAGANROG","VOLOGDA","TVER","TOMSK","IZHEVSK","SURGUT","PODOLSK","MAGADAN","CHEREPOVETS","NORILSK"];

// ===== НАВИГАЦИЯ =====
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { switchScreen('home'); }
function goServers() { switchScreen('servers'); }

// ===== ОТКРЫТИЕ =====
function openServers(g) {
  game = g;
  switchScreen('servers');
  loadServers();
}

// ===== СЕРВЕРА =====
function loadServers() {
  const el = document.getElementById('serversList');

  el.innerHTML = `
    <input id="search" placeholder="Поиск сервера..." oninput="filterServers()">
    <div id="serversContainer"></div>
  `;

  let list = game === 'gta'
    ? ['Downtown','Strawberry','Vinewood']
    : [...brColors, ...brCities];

  renderServers(list);
}

function renderServers(list) {
  const container = document.getElementById('serversContainer');
  container.innerHTML = '';

  list.forEach(name => {
    let div = document.createElement('div');
    div.className = 'btn server-btn';
    div.innerText = name;

    div.onclick = () => openBuy(name);

    container.appendChild(div);
  });
}

// ===== ПОИСК =====
function filterServers() {
  const value = document.getElementById('search').value.toLowerCase();

  let all = game === 'gta'
    ? ['Downtown','Strawberry','Vinewood']
    : [...brColors, ...brCities];

  renderServers(all.filter(s => s.toLowerCase().includes(value)));
}

// ===== ПОКУПКА =====
function openBuy(s) {
  server = s;
  switchScreen('buy');
  loadAmounts();
}

function loadAmounts() {
  const el = document.getElementById('amounts');
  el.innerHTML = '';

  [100,300,500,1000].forEach(p => {
    let div = document.createElement('div');
    div.className = 'btn';
    div.innerText = p + ' ₽';

    div.onclick = () => amount = p;

    el.appendChild(div);
  });
}

function buy() {
  let nick = document.getElementById('nickname').value;

  if (!nick) return alert('Введите ник');
  if (!amount) return alert('Выберите сумму');

  alert(`Покупка:\n${game}\n${server}\n${nick}\n${amount}₽`);
}
</script>

</body>
</html>
