<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Black Russia Store</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --blue-dark: #0d49a1; --blue-light: #3f89f8; --bg-dark: #0a0a0a; }
        body {
            margin: 0; padding: 0; background: radial-gradient(circle at center, #1a56ab 0%, #0a0a0a 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden;
        }
        /* Центральный блок */
        .main-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            width: 90%; max-width: 400px; border-radius: 30px; margin-top: 40px; padding: 25px; text-align: center;
        }
        .section-title { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        
        /* Кнопки выбора игры */
        .game-btn {
            width: 100%; height: 65px; border-radius: 18px; border: none; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .btn-gta { background: linear-gradient(to right, #f4b400, #ffcc33); color: black; }
        .btn-br { background: linear-gradient(to right, #e61e22, #f44336); color: white; }
        .game-btn:active { transform: scale(0.96); }

        /* Нижнее меню */
        .nav-bar {
            position: fixed; bottom: 20px; width: 90%; max-width: 400px; height: 70px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px); border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { text-align: center; opacity: 0.6; font-size: 10px; cursor: pointer; }
        .nav-active { opacity: 1; color: var(--blue-light); }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 2px; }

        .referral-btn {
            background: var(--blue-light); color: white; border: none; width: 100%; 
            padding: 12px; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="section-title">Главная</div>
        <p style="font-size: 12px; opacity: 0.5;">История последних покупок загружается...</p>
        
        <div class="section-title" style="margin-top: 30px;">Выбор игры:</div>
        
        <button class="game-btn btn-gta" onclick="buy('GTA 5 RP')">GTA 5 RP</button>
        <button class="game-btn btn-br" onclick="buy('BLACK RUSSIA')">BLACK RUSSIA</button>

        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; font-size: 11px; margin-top: 15px; border-left: 4px solid var(--blue-light);">
            ℹ️ Выберите нужный сервер, чтобы начать операцию
        </div>

        <div class="section-title" style="margin-top: 30px;">Реферальная система</div>
        <p style="font-size: 11px; opacity: 0.6;">Приглашайте друзей и получайте бонусы!</p>
        <button class="referral-btn">СКОПИРОВАТЬ ССЫЛКУ</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item"><span class="nav-icon">👤</span>Профиль</div>
        <div class="nav-item nav-active"><span class="nav-icon">🏠</span>Главная</div>
        <div class="nav-item"><span class="nav-icon">🔗</span>Рефералка</div>
        <div class="nav-item"><span class="nav-icon">💬</span>Помощь</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function buy(game) {
            // Передаем название игры твоему боту на VDS
            tg.sendData("Выбрана игра: " + game);
            tg.close();
        }
    </script>
</body>
</html>
