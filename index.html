<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('bg.png') no-repeat center/cover;
  color: white;
}

.container {
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  text-align: center;
}

h1 {
  font-size: 24px;
}

.game-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.gta {
  background: linear-gradient(90deg, orange, red);
}

.br {
  background: linear-gradient(90deg, #ff4b6e, red);
}

.game-btn img {
  height: 20px;
}

.alert {
  background: #ddd;
  color: black;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.copy-btn {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #4da3ff, #2a7fff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

<h1>ГЛАВНАЯ</h1>

<p>История последних покупок<br>Загрузка...</p>

<h2>ВЫБОР ИГРЫ:</h2>

<div class="game-btn gta" onclick="selectGame('gta')">
  <img src="gta5rp.svg">
  GTA 5 RP
</div>

<div class="game-btn br" onclick="selectGame('br')">
  <img src="black-russia.svg">
  BLACK RUSSIA
</div>

<div class="alert">
⚠️ Выберите нужный сервер, чтобы начать операцию
</div>

<h2>РЕФЕРАЛЬНАЯ СИСТЕМА</h2>

<p>Приглашайте друзей и получайте бонусы</p>

<button class="copy-btn" onclick="copyLink()">СКОПИРОВАТЬ ССЫЛКУ</button>

</div>

<script>
function selectGame(game) {
  if (game === 'gta') {
    alert('Переход к GTA 5 RP');
    // тут будет следующий экран
  }

  if (game === 'br') {
    alert('Переход к Black Russia');
  }
}

function copyLink() {
  const link = "https://t.me/your_bot";
  navigator.clipboard.writeText(link);
  alert("Ссылка скопирована");
}
</script>

</body>
</html>
