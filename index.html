<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Black Russia Store</title>
    <!-- Подключаем Telegram SDK -->
    <script src="https://telegram.org"></script>
    <!-- Подключаем оригинальные стили из твоей папки _next -->
    <link rel="stylesheet" href="_next/static/chunks/b756ec20543b9ab7.css">
    <style>
        body { background: radial-gradient(circle at center, #1a56ab 0%, #0a0a0a 100%); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .page { display: none; padding: 20px; padding-bottom: 100px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .buy-btn { background: linear-gradient(to right, #3f89f8, #0f57c1); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        
        /* Нижнее меню */
        .nav { position: fixed; bottom: 15px; width: 90%; left: 5%; height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-radius: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { text-align: center; opacity: 0.5; font-size: 10px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: #3f89f8; }
        .nav-icon { font-size: 24px; display: block; }
    </style>
</head>
<body>

    <!-- СТРАНИЦА: ГЛАВНАЯ -->
    <div id="home" class="page active">
        <h2 style="text-align: center; color: #3f89f8;">МАГАЗИН ВАЛЮТЫ</h2>
        <div class="card">
            <div style="font-weight: bold;">500,000 ВИРТ</div>
            <div style="color: #3f89f8;">150 ₽</div>
            <button class="buy-btn" onclick="sendOrder('500k_virts')">КУПИТЬ</button>
        </div>
        <div class="card">
            <div style="font-weight: bold;">1,000,000 ВИРТ</div>
            <div style="color: #3f89f8;">280 ₽</div>
            <button class="buy-btn" onclick="sendOrder('1kk_virts')">КУПИТЬ</button>
        </div>
    </div>

    <!-- СТРАНИЦА: ПРОФИЛЬ -->
    <div id="profile" class="page">
        <h2 style="text-align: center;">МОЙ ПРОФИЛЬ</h2>
        <div class="card">
            <p>ID: <span id="user_id">Загрузка...</span></p>
            <p>Имя: <span id="user_name">Игрок</span></p>
            <p>Покупок: 0</p>
        </div>
    </div>

    <!-- СТРАНИЦА: ПОМОЩЬ -->
    <div id="help" class="page">
        <h2 style="text-align: center;">ПОДДЕРЖКА</h2>
        <div class="card">
            <p>Возникли проблемы с оплатой или получением?</p>
            <button class="buy-btn" onclick="window.open('https://t.me')">СВЯЗАТЬСЯ С АДМИНОМ</button>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="nav">
        <div class="nav-item" onclick="showPage('profile')"><span class="nav-icon">👤</span>Профиль</div>
        <div class="nav-item active" onclick="showPage('home')"><span class="nav-icon">🏠</span>Главная</div>
        <div class="nav-item" onclick="showPage('help')"><span class="nav-icon">💬</span>Помощь</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Отображение данных пользователя
        if (tg.initDataUnsafe.user) {
            document.getElementById('user_id').innerText = tg.initDataUnsafe.user.id;
            document.getElementById('user_name').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Переключение вкладок
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Функция покупки
        function sendOrder(item) {
            tg.sendData(item); // Данные улетают боту на VDS
            tg.close();
        }
    </script>
</body>
</html>
