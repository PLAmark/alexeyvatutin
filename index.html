<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('bg.png') no-repeat center/cover;
  color: white;
}

.container {
  max-width: 400px;
  margin: 30px auto;
  padding: 15px;
}

.screen { display: none; }
.active { display: block; }

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

.btn {
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.gta { background: linear-gradient(90deg, orange, red); }
.br { background: linear-gradient(90deg, #ff4b6e, red); }

.server-btn {
  background: rgba(255,255,255,0.1);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 10px 0;
}

.pay-btn {
  background: linear-gradient(90deg, #4da3ff, #2a7fff);
}

.back {
  color: #aaa;
  cursor: pointer;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- ГЛАВНАЯ -->
<div id="home" class="screen active card">
<h2>ВЫБОР ИГРЫ</h2>

<div class="btn gta" onclick="openServers('gta')">
  <img src="gta5rp.svg" height="20"> GTA 5 RP
</div>

<div class="btn br" onclick="openServers('br')">
  <img src="black-russia.svg" height="20"> BLACK RUSSIA
</div>
</div>

<!-- СЕРВЕРА -->
<div id="servers" class="screen card">
<div class="back" onclick="goHome()">⬅ Назад</div>
<h3>ВЫБОР СЕРВЕРА</h3>
<div id="serversList"></div>
</div>

<!-- ПОКУПКА -->
<div id="buy" class="screen card">
<div class="back" onclick="goServers()">⬅ Назад</div>

<h3>ПОКУПКА</h3>

<input id="nickname" placeholder="Введите ник">

<div id="amounts"></div>

<div class="btn pay-btn" onclick="buy()">КУПИТЬ</div>
</div>

</div>

<script>
let game = '';
let server = '';
let amount = 0;

// ОТКРЫТЬ СЕРВЕРА
function openServers(g) {
  game = g;
  switchScreen('servers');
  loadServers();
}

// СЕРВЕРА
function loadServers() {
  const el = document.getElementById('serversList');
  el.innerHTML = '';

  let list = game === 'gta'
    ? ['Downtown','Strawberry','Vinewood']
    : ['Москва','Питер','Казань'];

  list.forEach(s => {
    let div = document.createElement('div');
    div.className = 'btn server-btn';
    div.innerText = s;
    div.onclick = () => openBuy(s);
    el.appendChild(div);
  });
}

// ОТКРЫТЬ ПОКУПКУ
function openBuy(s) {
  server = s;
  switchScreen('buy');
  loadAmounts();
}

// СУММЫ
function loadAmounts() {
  const el = document.getElementById('amounts');
  el.innerHTML = '';

  let prices = [100, 300, 500, 1000];

  prices.forEach(p => {
    let div = document.createElement('div');
    div.className = 'btn';
    div.innerText = p + ' ₽';
    div.onclick = () => {
      amount = p;
      alert('Выбрано: ' + p);
    };
    el.appendChild(div);
  });
}

// ПОКУПКА
function buy() {
  let nick = document.getElementById('nickname').value;

  if (!nick) return alert('Введите ник');
  if (!amount) return alert('Выберите сумму');

  alert(`Покупка:\nИгра: ${game}\nСервер: ${server}\nНик: ${nick}\nСумма: ${amount}₽`);

  // ТУТ ТВОЯ ССЫЛКА ОПЛАТЫ
  // window.location.href = "https://your-payment-link";
}

// ПЕРЕКЛЮЧЕНИЕ
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { switchScreen('home'); }
function goServers() { switchScreen('servers'); }
</script>

</body>
</html>
